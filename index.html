<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>早稲田理工塾 OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Noto Sans SC','PingFang SC','Hiragino Sans GB','Microsoft YaHei',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:3px}

/* ========== Home (admin) glass design ========== */
.home-ambient{position:absolute;width:50%;height:50%;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.home-ambient-tl{top:-10%;left:-10%;background:rgba(191,219,254,.35)}
.home-ambient-br{bottom:-10%;right:-10%;background:rgba(153,246,228,.3)}

.glass-card{background:rgba(255,255,255,.62);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.9);border-radius:24px;box-shadow:0 20px 50px -20px rgba(30,64,175,.06);transition:border-color .25s,box-shadow .25s}
.glass-card.hv-emerald:hover{border-color:rgba(209,250,229,.9)}
.glass-card.hv-rose:hover{border-color:rgba(255,228,230,.9)}
.glass-card.hv-amber:hover{border-color:rgba(254,243,199,.9)}

.stat-card{padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between;min-height:110px}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.12em;color:#94a3b8}
.stat-value{font-size:28px;font-weight:300;line-height:1}
.stat-value.em{color:#10b981}
.stat-value.rose{color:#f43f5e}
.stat-value.amber{color:#f59e0b}
.stat-sub{font-size:10px;color:#94a3b8;letter-spacing:.05em}

.home-chip{padding:3px 8px;background:rgba(254,243,199,.5);border:1px solid rgba(253,230,138,.5);border-radius:6px;font-size:10px;color:rgba(180,83,9,.8)}

.clock-glow{position:absolute;inset:-14px;border-radius:50%;filter:blur(22px);background:rgba(226,232,240,.35);transition:all .7s;z-index:0}
.clock-btn{position:relative;border-radius:50%;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .45s;cursor:pointer;box-shadow:0 8px 30px -6px rgba(15,23,42,.06);color:#94a3b8;font-family:inherit}
.clock-btn:hover:not(:disabled){box-shadow:0 8px 30px -6px rgba(59,130,246,.18);color:#3b82f6;border-color:rgba(219,234,254,.9)}
.clock-btn:hover:not(:disabled) .clock-icon{transform:scale(1.08)}
.clock-btn:active:not(:disabled){transform:scale(.96)}
.clock-btn[disabled]{cursor:wait;opacity:.7}
.clock-icon{transition:transform .45s}
.clock-label{font-size:11px;letter-spacing:.22em;font-weight:500}
.clock-btn.ac:hover:not(:disabled){color:#3b82f6;border-color:rgba(147,197,253,.6)}
.clock-btn.wn:hover:not(:disabled){color:#f59e0b;border-color:rgba(253,230,138,.6)}
.clock-btn.gn:hover:not(:disabled){color:#10b981;border-color:rgba(167,243,208,.6)}
.clock-btn.pp:hover:not(:disabled){color:#7c3aed;border-color:rgba(196,181,253,.6)}
.clock-btn-lg{width:128px;height:128px}
.clock-btn-md{width:96px;height:96px}

.home-banner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;background:rgba(255,247,237,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(254,215,170,.7);border-radius:16px;cursor:pointer;transition:background .2s,border-color .2s,transform .15s;color:inherit;font-family:inherit;width:100%;text-align:left}
.nav-tile:hover{border-color:rgba(226,232,240,.9)!important;transform:translateY(-1px);box-shadow:0 10px 24px -14px rgba(15,23,42,.18)!important}
.nav-tile:active{transform:scale(.99)}

/* 表格数字输入：去掉 Safari/Chrome 的上下 spinner，让 text-align:right 真正贴到右边 */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* 上传表格内单元格输入的聚焦高亮 —— 仅该页用，避免污染其它页 */
.upload-cell input:focus,.upload-cell select:focus{background:#fff!important;border-color:rgba(59,130,246,.6)!important;box-shadow:0 0 0 3px rgba(59,130,246,.12)!important}
.upload-row:hover{background:rgba(59,130,246,.04)!important}
.home-banner:hover{background:rgba(255,237,213,.6);border-color:rgba(253,186,116,.7)}
.home-banner:active{transform:scale(.995)}

.icon-btn{padding:9px;background:rgba(255,255,255,.65);border:1px solid rgba(226,232,240,.6);border-radius:999px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;position:relative;transition:all .2s;color:#94a3b8;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:#fff;color:#3b82f6}
.icon-btn:active{transform:scale(.95)}

.pill-btn{padding:8px 18px;background:rgba(59,130,246,.9);color:#fff;border:none;border-radius:999px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;box-shadow:0 4px 15px rgba(59,130,246,.18);transition:all .2s}
.pill-btn:hover{background:#2563eb;box-shadow:0 4px 20px rgba(59,130,246,.28)}
.pill-btn:active{transform:scale(.97)}
.pill-btn.ghost{background:transparent;color:#64748b;border:1px solid rgba(148,163,184,.4);box-shadow:none}
.pill-btn.ghost:hover{background:rgba(248,250,252,.8);color:#334155;box-shadow:none}

.bell-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:#fb7185;border-radius:50%;animation:bell-pulse 1.6s ease-in-out infinite}
@keyframes bell-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.25)}}
@keyframes spin{to{transform:rotate(360deg)}}

.home-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.home-grid>.span-4{grid-column:span 4}
.home-grid>.span-2{grid-column:span 2}

.fab-add{position:fixed;bottom:32px;right:28px}
@media (max-width:768px){.fab-add{bottom:calc(80px + env(safe-area-inset-bottom,0px));right:16px}}

.clock-panel{padding:30px 36px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px}
.clock-panel .clock-info{flex:1;min-width:240px}
.clock-panel .clock-time-label{color:#94a3b8;font-size:12px;font-weight:500;letter-spacing:.05em;margin-bottom:6px}
.clock-panel .clock-time{font-size:54px;font-weight:300;color:#334155;letter-spacing:.05em;font-family:monospace;line-height:1;margin-bottom:10px}
.clock-panel .clock-status{color:#94a3b8;font-size:11px;letter-spacing:.15em;text-transform:uppercase}
.clock-panel .clock-buttons{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center}

@media (max-width: 768px){
  .home-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .home-grid>*{grid-column:span 2}
  .home-grid>.span-4{grid-column:span 2}
  .home-grid>.span-2{grid-column:span 2}
  .home-grid>.m-half{grid-column:span 1}
  .clock-panel{flex-direction:column;padding:28px 20px;gap:20px;text-align:center}
  .clock-panel .clock-info{min-width:0;width:100%;text-align:center}
  .clock-panel .clock-time{font-size:44px;margin:0 auto 8px}
  .stat-card{min-height:96px;padding:18px 20px}
  .stat-value{font-size:26px}
}
@media (max-width: 420px){
  .clock-panel .clock-time{font-size:38px}
}
</style>
</head>
<body><div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
